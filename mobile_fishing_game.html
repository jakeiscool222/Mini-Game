<!DOCTYPE html>
<html lang="en" class="h-full w-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Tap‑Fish Prehistoric</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;touch-action:manipulation;}
  canvas{background:#0f3e6d;display:block;width:100%;height:70vh;}
  #hud{height:30vh;}
  .fish{position:absolute;width:32px;height:16px;background:#ffdd57;border-radius:9999px;}
</style>
</head>
<body class="flex flex-col items-center justify-start text-white select-none">
  <h1 class="text-lg font-bold mt-2">Tap‑Fish: Prehistoric Pond</h1>
  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="w-full flex flex-col items-center justify-center gap-2">
    <div id="log" class="text-sm"></div>
    <button id="releaseBtn" class="bg-amber-400 text-black font-semibold py-2 px-4 rounded-full disabled:opacity-40">Release All (0)</button>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
let fishTank = [];

function resize(){
  const rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr,dpr);
}
resize();
window.addEventListener('resize',resize);

function draw(){
  ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
  // draw water gradient
  const grad = ctx.createLinearGradient(0,0,0,canvas.height/dpr);
  grad.addColorStop(0,'#0f3e6d');
  grad.addColorStop(1,'#04233d');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);

  // draw fish
  fishTank.forEach(f=>{
    ctx.fillStyle=f.color;
    ctx.beginPath();
    ctx.ellipse(f.x,f.y,f.size*1.2,f.size,0,0,Math.PI*2);
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(f.x-f.size*1.2,f.y);
    ctx.lineTo(f.x-f.size*2,f.y-f.size);
    ctx.lineTo(f.x-f.size*2,f.y+f.size);
    ctx.closePath();
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

function addFish(x,y){
  if(fishTank.length>=10){flashMsg('Tank full! Release to catch more.');return;}
  const size  = Math.random()*6+6; // 6‑12 px
  const color = ['#ffdd57','#60d394','#f55d5d','#38bdf8','#d946ef'][Math.floor(Math.random()*5)];
  fishTank.push({x,y,color,size});
  updateBtn();
}

canvas.addEventListener('pointerdown',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  addFish(x,y);
});

const log    = document.getElementById('log');
const btn    = document.getElementById('releaseBtn');

function flashMsg(msg){
  log.textContent=msg;
  setTimeout(()=>log.textContent='',1500);
}

function updateBtn(){
  btn.textContent=`Release All (${fishTank.length})`;
  btn.disabled=fishTank.length===0;
}
updateBtn();

btn.addEventListener('click',()=>{
  if(!fishTank.length)return;
  flashMsg(`Released ${fishTank.length} prehistoric fish back to the wild!`);
  fishTank=[];
  updateBtn();
});
</script>
</body>
</html>
